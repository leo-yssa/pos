services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: pos
      MYSQL_DATABASE: judang
      MYSQL_USER: pos
      MYSQL_PASSWORD: pos
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  mysql-data:

